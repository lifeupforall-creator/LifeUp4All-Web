<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeUp4All | AI Wealth Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-main: #ffffff;
            --text-secondary: #a3aed0;
            --brand-blue: #3ABDFF;
            --brand-green: #22D383;
            --brand-purple: #9B6EFF;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        header { padding: 2rem 5%; display: flex; align-items: center; }
        
        .logo-container { display: flex; align-items: center; gap: 12px; font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 700; }

        .hero {
            display: flex; flex: 1; align-items: center; justify-content: space-between;
            padding: 0 5%; gap: 40px;
        }

        .hero-content { flex: 1; max-width: 600px; }
        h1 { font-family: 'Poppins', sans-serif; font-size: 3rem; line-height: 1.2; margin-bottom: 20px; }
        p.subtitle { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 30px; }

        .waitlist-form { display: flex; flex-direction: column; gap: 15px; max-width: 400px; }
        
        input {
            padding: 15px; border-radius: 8px; border: 1px solid #2d3748;
            background-color: #1a202c; color: white; font-size: 1rem;
        }

        button {
            padding: 15px; border-radius: 8px; border: none;
            background: linear-gradient(90deg, var(--brand-blue), var(--brand-green));
            color: white; font-family: 'Poppins', sans-serif; font-weight: 600;
            cursor: pointer; transition: transform 0.2s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(58, 189, 255, 0.3); }

        .hero-image img { width: 100%; max-width: 500px; border-radius: 20px; }

        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; padding: 2rem 5%; }
            .waitlist-form { margin: 0 auto; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="LifeUp4All Logo" style="height: 40px; width: auto;">
            LifeUp4All
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Πάρε τον έλεγχο των οικονομικών σου με τον πρώτο AI Coach.</h1>
            <p class="subtitle">Αυτοματοποίησε τις αποταμιεύσεις σου και δες την καθαρή σου θέση να μεγαλώνει. Γίνε μέλος της λίστας αναμονής.</p>
            
            <form class="waitlist-form" id="waitlistForm">
                <input type="text" id="userName" placeholder="Το όνομά σου" required>
                <input type="email" id="userEmail" placeholder="Το email σου" required>
                <button type="submit" id="submitBtn">Join the Waitlist</button>
            </form>
        </div>

        <div class="hero-image">
            <img src="mentor.PNG" alt="AI Mentor">
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ΑΝΤΙΚΑΤΑΣΤΗΣΕ ΤΑ ΠΑΡΑΚΑΤΩ ΜΕ ΤΑ ΣΤΟΙΧΕΙΑ ΣΟΥ
        const supabaseUrl = 'https://bgctuzfrykwarzzdlgdk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnY3R1emZyeWt3YXJ6emRsZ2RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTYwNTgsImV4cCI6MjA5MjI3MjA1OH0.LrWuhCdXXXA7ePfEahC2QHVbIZI_ejpxqzQ5Zp1KYEM';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('waitlistForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;

            btn.textContent = 'Αποστολή...';
            btn.disabled = true;

            const { error } = await _supabase
                .from('waitlist')
                .insert([{ name: name, email: email }]);

            if (error) {
                alert('Σφάλμα: ' + error.message);
                btn.textContent = 'Join the Waitlist';
                btn.disabled = false;
            } else {
                alert('Συγχαρητήρια ' + name + '! Γράφτηκες επιτυχώς.');
                document.getElementById('waitlistForm').reset();
                btn.textContent = 'Επιτυχία!';
            }
        });
    </script>
</body>
</html>
